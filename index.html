<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>💌</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    /* ── RESET ── */
    *, *::before, *::after {
      box-sizing: border-box; margin: 0; padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --rose:    #c94070;
      --rose-lt: #e8607f;
      --blush:   #f2c4cd;
      --bg:      #fdf8f4;
      --text:    #2a1520;
      --muted:   #8a5060;
      --white:   #ffffff;
    }

    html { height: 100%; -webkit-text-size-adjust: 100%; }

    body {
      height: 100%; width: 100%;
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      overflow: hidden;
      /* do NOT use position:relative here — it messes with fixed children on Safari */
    }

    /* ── AMBIENT BLOBS ── */
    .blob {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
    }
    .blob-a {
      width: 70vmax; height: 70vmax;
      top: -25vmax; left: -20vmax;
      background: radial-gradient(circle, rgba(232,96,127,0.13) 0%, transparent 68%);
      animation: blobA 20s ease-in-out infinite alternate;
    }
    .blob-b {
      width: 60vmax; height: 60vmax;
      bottom: -20vmax; right: -18vmax;
      background: radial-gradient(circle, rgba(201,64,112,0.10) 0%, transparent 68%);
      animation: blobB 24s ease-in-out infinite alternate;
    }
    @keyframes blobA { to { transform: translate(8vw, 6vh) scale(1.1); } }
    @keyframes blobB { to { transform: translate(-6vw,-8vh) scale(1.08); } }

    /* ── FLOATING PETALS ── */
    #petals {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 1; overflow: hidden;
    }
    .petal {
      position: absolute; bottom: -50px; opacity: 0;
      animation: rise linear infinite;
    }
    @keyframes rise {
      0%   { opacity: 0;    transform: translateY(0) rotate(0deg); }
      8%   { opacity: 0.5; }
      85%  { opacity: 0.3; }
      100% { opacity: 0;    transform: translateY(-115vh) rotate(30deg); }
    }

    /* ── SCREENS ──
       All screens are fixed, full-viewport.
       They show/hide via opacity + pointer-events only.
       z-index 10 for intro/question, 20 for celebration. */
    .screen {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 2rem;
      /* safe area padding for iPhone notch / home bar */
      padding-top:    max(2rem, env(safe-area-inset-top, 2rem));
      padding-bottom: max(2rem, env(safe-area-inset-bottom, 2rem));
      z-index: 10;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.6s ease;
    }
    .screen.show {
      opacity: 1;
      pointer-events: all;
    }

    /* ── INTRO TEXT ── */
    .intro-word {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300; font-style: italic;
      font-size: clamp(3rem, 15vw, 5.5rem);
      color: var(--text);
      text-align: center; line-height: 1.2;
      transform: translateY(14px) scale(0.95);
      transition: transform 0.85s cubic-bezier(0.34,1.4,0.64,1) 0.05s;
    }
    .screen.show .intro-word {
      transform: translateY(0) scale(1);
    }
    .intro-bar {
      margin-top: 1.5rem;
      width: 34px; height: 1.5px;
      background: var(--rose); border-radius: 2px;
      transform: scaleX(0); opacity: 0;
      transition: transform 0.5s cubic-bezier(0.34,1.4,0.64,1) 0.4s,
                  opacity 0.4s ease 0.4s;
    }
    .screen.show .intro-bar {
      transform: scaleX(1); opacity: 1;
    }

    /* ── QUESTION SCREEN ── */
    #q-rose {
      font-size: 2.8rem;
      display: block; margin-bottom: 1.3rem;
      animation: beat 2.5s ease-in-out infinite;
    }
    @keyframes beat {
      0%,100% { transform: scale(1); }
      14%     { transform: scale(1.2); }
      28%     { transform: scale(1); }
      42%     { transform: scale(1.13); }
    }
    #q-text {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 400;
      font-size: clamp(2rem, 9vw, 3.4rem);
      color: var(--text);
      text-align: center; line-height: 1.28;
    }
    #q-text em { color: var(--rose); font-style: italic; }

    /* caption — fixed height, no layout shift */
    #caption-wrap {
      height: 2.8rem;
      display: flex; align-items: center; justify-content: center;
      margin: 1.6rem 0 1.4rem;
      width: 100%;
    }
    #caption {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: clamp(1.15rem, 5vw, 1.5rem);
      color: var(--rose); text-align: center;
      opacity: 0; transform: translateY(6px);
      transition: opacity 0.3s ease, transform 0.3s ease;
      pointer-events: none;
    }
    #caption.show { opacity: 1; transform: translateY(0); }

    /* YES button — always in normal flow of question screen */
    #btn-yes {
      display: block;
      width: min(280px, 80vw);
      padding: 1.1rem 1.5rem;
      border: none; border-radius: 100px;
      background: linear-gradient(140deg, var(--rose-lt), var(--rose));
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      font-weight: 500; font-size: 1.12rem;
      letter-spacing: 0.025em;
      cursor: pointer;
      box-shadow: 0 8px 28px rgba(201,64,112,0.4);
      touch-action: manipulation;
      /* transition for giant mode */
      transition: all 0.5s cubic-bezier(0.34,1.2,0.64,1);
      position: relative; z-index: 15;
    }
    #btn-yes:active { transform: scale(0.96); }

    /* Giant Yes — covers full screen */
    #btn-yes.giant {
      position: fixed !important;
      inset: 0 !important;
      width: 100% !important;
      height: 100% !important;
      border-radius: 0 !important;
      font-size: clamp(2.2rem, 9vw, 4rem) !important;
      box-shadow: none !important;
      z-index: 50 !important;
      transform: none !important;
    }

    /* NO button — starts hidden in flow, becomes fixed immediately on first click */
    /* We render it as fixed from the start so there's ZERO transition complexity */
    #btn-no {
      position: fixed;
      /* centered below yes button initially */
      width: min(280px, 80vw);
      padding: 1.05rem 1.5rem;
      border: 1.5px solid var(--blush); border-radius: 100px;
      background: var(--white);
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-weight: 500; font-size: 1.12rem;
      letter-spacing: 0.025em;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(0,0,0,0.07);
      touch-action: manipulation;
      z-index: 40; /* above screens so it's always tappable */
      /* smooth movement */
      transition: top  0.42s cubic-bezier(0.34,1.5,0.64,1),
                  left 0.42s cubic-bezier(0.34,1.5,0.64,1),
                  opacity 0.3s ease,
                  transform 0.15s ease;
      /* initially invisible until question screen shows */
      opacity: 0;
      pointer-events: none;
    }
    #btn-no:active { transform: scale(0.95); }
    #btn-no.ready {
      opacity: 1;
      pointer-events: all;
    }
    #btn-no.gone {
      opacity: 0 !important;
      pointer-events: none !important;
    }

    /* ── CELEBRATION SCREEN ── */
    #screen-yes { z-index: 20; background: linear-gradient(160deg,#fff0f3,#fde4ea,#fad0d8); }
    .cel-emoji {
      font-size: 4rem; display: block;
      animation: popIn 0.55s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    .cel-title {
      font-family: 'Cormorant Garamond', serif; font-weight: 600;
      font-size: clamp(3.2rem, 15vw, 6rem);
      color: var(--rose); text-align: center; line-height: 1.1;
      animation: up 0.65s cubic-bezier(0.34,1.4,0.64,1) 0.12s both;
    }
    .cel-sub {
      font-family: 'Cormorant Garamond', serif; font-style: italic;
      font-size: clamp(1.2rem, 5.5vw, 1.9rem);
      color: var(--muted); text-align: center; line-height: 1.4;
      margin-top: 0.6rem;
      animation: up 0.65s cubic-bezier(0.34,1.4,0.64,1) 0.27s both;
    }
    .cel-sub2 {
      font-size: clamp(0.85rem, 3.5vw, 1.1rem);
      color: var(--muted); opacity: 0.7; text-align: center;
      font-weight: 300; margin-top: 0.5rem;
      animation: up 0.65s cubic-bezier(0.34,1.4,0.64,1) 0.42s both;
    }
    @keyframes popIn {
      from { transform: scale(0) rotate(-20deg); opacity: 0; }
      to   { transform: scale(1) rotate(0); opacity: 1; }
    }
    @keyframes up {
      from { opacity:0; transform:translateY(20px); }
      to   { opacity:1; transform:translateY(0); }
    }

    /* confetti pieces */
    .confetti {
      position: fixed; pointer-events: none; z-index: 30;
      animation: fall linear forwards;
    }
    @keyframes fall {
      0%   { opacity:1; transform:translateY(0) rotate(0deg) scale(1); }
      100% { opacity:0; transform:translateY(115vh) rotate(540deg) scale(0.4); }
    }
  </style>
</head>
<body>

  <!-- Ambient blobs -->
  <div class="blob blob-a" aria-hidden="true"></div>
  <div class="blob blob-b" aria-hidden="true"></div>

  <!-- Floating petals -->
  <div id="petals" aria-hidden="true"></div>

  <!-- SCREEN 1: hey -->
  <section class="screen" id="screen-hey">
    <span class="intro-word">hey</span>
    <div class="intro-bar"></div>
  </section>

  <!-- SCREEN 2: I have something to tell you -->
  <section class="screen" id="screen-tell">
    <span class="intro-word">I have something<br>to tell you...</span>
    <div class="intro-bar"></div>
  </section>

  <!-- SCREEN 3: Question -->
  <section class="screen" id="screen-question">
    <span id="q-rose" aria-hidden="true">🌹</span>
    <h1 id="q-text">Me da outra chance<br>de te fazer feliz?<br> <em>To disposto a fazer tudo diferente, e te contar tudo que aconteceu.</em></h1>
    <div id="caption-wrap" aria-live="polite" aria-atomic="true">
      <p id="caption"></p>
    </div>
    <!-- Only Yes lives here in normal flow -->
    <button id="btn-yes" onclick="handleYes()">Yes ❤️</button>
  </section>

  <!-- SCREEN 4: Celebration -->
  <section class="screen" id="screen-yes" aria-live="assertive">
    <span class="cel-emoji" aria-hidden="true">🥰</span>
    <h2 class="cel-title">UHUUUL !! ❤️</h2>
    <p class="cel-sub">"You just made my week.<br>I think about you often, you are very special to me."</p>
    <p class="cel-sub2">I promise I'll make it worth it 🌙</p>
  </section>

  <!-- NO button lives OUTSIDE all screens so it's never clipped or pointer-blocked -->
  <button id="btn-no" onclick="handleNo()">No</button>

  <script>
    /* ── CONFIG ── */
    const HOLD_HEY  = 2200;  // ms "hey" is visible
    const HOLD_TELL = 2500;  // ms second intro is visible
    const FADE      = 650;   // matches CSS transition
    const GAP       = 280;   // silence between screens

    const MAX_NO = 5;        // taps before giant Yes

    const CAPTIONS = [
      "oh why 🥺",
      "you mean the world to me…",
      "please? 🙏",
      "I'll buy you food 🍕",
      "don't do this to me",
      "come on… seriously?",
      "are you sure???",
      "I made us a playlist 🎶",
      "last chance 👀",
    ];

    /* ── STATE ── */
    let noTaps   = 0;
    let capIdx   = 0;
    let giant    = false;
    let yesDone  = false;

    /* ── DOM ── */
    const sHey   = document.getElementById('screen-hey');
    const sTell  = document.getElementById('screen-tell');
    const sQ     = document.getElementById('screen-question');
    const sYes   = document.getElementById('screen-yes');
    const btnYes = document.getElementById('btn-yes');
    const btnNo  = document.getElementById('btn-no');
    const capEl  = document.getElementById('caption');
    const petals = document.getElementById('petals');

    /* ── SCREEN HELPERS ── */
    const show = el => el.classList.add('show');
    const hide = el => el.classList.remove('show');

    /* ── PETALS ── */
    const PCHARS = ['🌸','💕','✿','♡','🌷'];
    function spawnPetal() {
      const p = document.createElement('span');
      p.className = 'petal';
      p.textContent = PCHARS[Math.floor(Math.random() * PCHARS.length)];
      const size = 0.6 + Math.random() * 0.8;
      const dur  = 10  + Math.random() * 14;
      p.style.cssText = `left:${Math.random()*100}vw;font-size:${size}rem;animation-duration:${dur}s;animation-delay:-${Math.random()*dur}s`;
      petals.appendChild(p);
      setTimeout(() => p.remove(), (dur + 1) * 1000);
    }
    for (let i = 0; i < 14; i++) spawnPetal();
    setInterval(spawnPetal, 2000);

    /* ── INTRO SEQUENCE ── */
    function runIntro() {
      setTimeout(() => {
        show(sHey);
        setTimeout(() => {
          hide(sHey);
          setTimeout(() => {
            show(sTell);
            setTimeout(() => {
              hide(sTell);
              setTimeout(() => {
                show(sQ);
                positionNoBtn();        // place No near Yes
                setTimeout(() => btnNo.classList.add('ready'), 300); // fade it in
              }, GAP);
            }, HOLD_TELL);
          }, FADE + GAP);
        }, HOLD_HEY);
      }, 600);
    }

    /* ── POSITION NO BUTTON ──
       On question screen show, place No directly below Yes.
       After every tap, jump to a random safe spot. */
    function positionNoBtn() {
      const yRect = btnYes.getBoundingClientRect();
      // Start directly below Yes
      const w = btnNo.offsetWidth  || Math.min(280, window.innerWidth * 0.8);
      const h = btnNo.offsetHeight || 52;
      const x = yRect.left + (yRect.width - w) / 2;
      const y = yRect.bottom + 16;
      btnNo.style.left = x + 'px';
      btnNo.style.top  = y + 'px';
    }

    function moveNoBtn() {
      const VW = window.innerWidth;
      const VH = window.innerHeight;
      const w  = btnNo.offsetWidth  || Math.min(280, VW * 0.8);
      const h  = btnNo.offsetHeight || 52;
      const PAD = 22;

      // safe-area estimates for iPhone
      const topSafe = 50;
      const botSafe = 40;

      const minX = PAD;
      const maxX = VW - w - PAD;
      const minY = PAD + topSafe;
      const maxY = VH - h - PAD - botSafe;

      // Pick zone (top / bottom / left / right) to avoid Yes button area
      const zones = [
        // top third
        () => ({ x: minX + Math.random() * (maxX - minX), y: minY + Math.random() * (VH * 0.2) }),
        // bottom strip
        () => ({ x: minX + Math.random() * (maxX - minX), y: VH * 0.72 + Math.random() * (maxY - VH * 0.72) }),
        // left edge
        () => ({ x: minX, y: minY + Math.random() * (maxY - minY) }),
        // right edge
        () => ({ x: maxX, y: minY + Math.random() * (maxY - minY) }),
      ];

      const { x, y } = zones[Math.floor(Math.random() * zones.length)]();

      // hard clamp — never off-screen
      btnNo.style.left = Math.max(minX, Math.min(maxX, x)) + 'px';
      btnNo.style.top  = Math.max(minY, Math.min(maxY, y)) + 'px';
    }

    /* ── CAPTION ── */
    let capTimer;
    function showCaption(text) {
      capEl.classList.remove('show');
      clearTimeout(capTimer);
      capTimer = setTimeout(() => {
        capEl.textContent = text;
        capEl.classList.add('show');
      }, 40);
    }

    /* ── HANDLE NO ── */
    function handleNo() {
      if (giant || yesDone) return;
      noTaps++;

      showCaption(CAPTIONS[capIdx % CAPTIONS.length]);
      capIdx++;

      if (noTaps >= MAX_NO) {
        /* GIANT YES TAKEOVER */
        giant = true;

        // Kill No button
        btnNo.classList.add('gone');

        // Update caption
        setTimeout(() => showCaption("it was always going to be yes 😏"), 350);

        // Expand Yes to full screen
        // First pin it to its current position as fixed, then animate to full screen
        const r = btnYes.getBoundingClientRect();
        btnYes.style.position = 'fixed';
        btnYes.style.top      = r.top  + 'px';
        btnYes.style.left     = r.left + 'px';
        btnYes.style.width    = r.width + 'px';
        btnYes.style.height   = r.height + 'px';
        // remove from flex flow
        document.body.appendChild(btnYes);

        // force paint, then animate
        requestAnimationFrame(() => requestAnimationFrame(() => {
          btnYes.classList.add('giant');
        }));

      } else {
        /* MOVE NO BUTTON */
        moveNoBtn();
      }
    }

    /* ── HANDLE YES ── */
    function handleYes() {
      if (yesDone) return;
      yesDone = true;
      btnYes.onclick = null;
      btnNo.classList.add('gone');

      // NEW CODE VVV
      // TRACKING — sends you an email when she clicks Yes
      fetch("https://formspree.io/f/https://formspree.io/f/mbdpbrgl", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          event: "She said YES! 💕",
          time: new Date().toLocaleString(),
          url: window.location.href
        })
      });
      // NEW CODE ^^^

      setTimeout(() => {
        hide(sQ);
        // also hide giant yes if it's covering screen
        if (giant) {
          btnYes.style.opacity = '0';
          btnYes.style.transition = 'opacity 0.4s ease';
        }
        setTimeout(() => {
          show(sYes);
          launchConfetti();
        }, 380);
      }, giant ? 200 : 80);
    }

    /* ── CONFETTI ── */
    const CCHARS = ['💕','🌹','❤️','🌸','✨','💝','🎀','💖','🌷','💘'];
    function launchConfetti() {
      for (let i = 0; i < 42; i++) setTimeout(dropOne, i * 55);
    }
    function dropOne() {
      const el = document.createElement('span');
      el.className = 'confetti';
      el.setAttribute('aria-hidden','true');
      el.textContent = CCHARS[Math.floor(Math.random() * CCHARS.length)];
      const dur = 2.2 + Math.random() * 2.2;
      el.style.cssText = `left:${5+Math.random()*90}vw;top:${-(5+Math.random()*20)}vh;font-size:${1+Math.random()*1.5}rem;animation-duration:${dur}s`;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), (dur + 0.5) * 1000);
    }

    /* ── START ── */
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', runIntro);
    } else {
      runIntro();
    }
  </script>
</body>
</html>
